<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZettoPay Online</title>
    
    <style>
        /* html এবং body এর সাইজ স্ক্রিনের একদম সমান করে দেওয়া হলো */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* বাইরের স্ক্রলবার পুরোপুরি বন্ধ */
            background-color: #0f172a; /* আপনার সাইটের কালারের সাথে মিলিয়ে ব্যাকগ্রাউন্ড */
        }
        
        /* iframe কে চারপাশ থেকে টেনে স্ক্রিনের সমান করা হলো */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    
    <iframe
        src="https://script.google.com/macros/s/AKfycby3vOJzfSqhwiNiQheRJfKHtXcEA9zGQjy6RofsixOENYQZEIVN2ejGHYRbANISazTF/exec"
        allowfullscreen="true">
    </iframe>

</body>
</html>
