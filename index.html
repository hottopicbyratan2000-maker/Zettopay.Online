<!DOCTYPE html>
<html>
<head>
  <title>Zettopay Online</title>
</head>
<body>
  <iframe 
    src="https://script.google.com/macros/s/AKfycbx7XL2N-t2gCd2AV8vMjZj2heJ66C9YzLoJtraq_eYROsqoyoEmKBP58FOThHE7vC4-/exec"
    width="100%"
    height="100%"
    allowfullscreen="true"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;">
  </iframe>

  <script>
    window.onload = function() {
      document.querySelector('iframe')
        .requestFullscreen()
        .catch((err) => {
          console.error('Error attempting to enable full-screen mode:', err.message);
        });
    };
  </script>
</body>
</html>
